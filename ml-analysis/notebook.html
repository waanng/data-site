<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notebook | DATA LABS</title>
  <meta name="description" content="在线查看完整的机器学习分析Notebook">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/main.css?v=20260425-2">
  
  <style>
    .viewer-layout {
      display: flex;
      height: calc(100vh - 64px);
      padding-top: 64px;
    }
    
    .viewer-sidebar {
      width: 300px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      padding: 24px;
      overflow-y: auto;
      flex-shrink: 0;
    }
    
    .viewer-content {
      flex: 1;
      position: relative;
      background: white;
      overflow: hidden;
    }
    
    .viewer-content iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    
    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    
    .loading-overlay.hidden {
      display: none;
    }
    
    .loading-overlay i {
      font-size: 48px;
      color: var(--accent-primary);
      animation: spin 2s linear infinite;
      margin-bottom: 16px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .download-section {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border-color);
    }
    
    @media (max-width: 768px) {
      .viewer-sidebar {
        display: none;
      }
    }
  </style>
</head>
<body>
  <!-- 顶部状态栏 -->
  <header class="top-bar">
    <div class="brand">
      <div class="brand-icon">DL</div>
      <div>
        <div class="brand-text">DATA LABS</div>
        <div class="brand-sub">数据分析实验室</div>
      </div>
    </div>
    
    <nav class="nav-links">
      <a href="../index.html">首页</a>
      <a href="../projects/index.html">项目</a>
    </nav>

    <button class="mobile-menu-btn" aria-label="打开导航菜单">
      <i class="fas fa-bars"></i>
    </button>
  </header>

  <div class="viewer-layout">
    <aside class="viewer-sidebar">
      <div class="notebook-info">
        <h3><i class="fas fa-brain"></i> 机器学习分类预测</h3>
        <ul class="notebook-meta-list">
          <li>
            <i class="fas fa-database"></i>
            <span>4,050 条数据</span>
          </li>
          <li>
            <i class="fas fa-chart-line"></i>
            <span>3 种模型对比</span>
          </li>
          <li>
            <i class="fas fa-star"></i>
            <span>AUC 0.70</span>
          </li>
          <li>
            <i class="fas fa-clock"></i>
            <span>预计阅读 30 分钟</span>
          </li>
        </ul>
      </div>
      
      <div class="toc-title">目录导航</div>
      <ul class="toc-list">
        <li><a href="notebook-content.html" target="notebook-frame">完整 Notebook</a></li>
      </ul>
      
      <div class="download-section">
        <div class="toc-title">下载</div>
        <a href="../ml_analysis_notebook_executed.ipynb" 
           class="btn btn-secondary" 
           style="width: 100%; justify-content: center;"
           download>
          <i class="fas fa-download"></i>
          下载 .ipynb 文件
        </a>
      </div>
    </aside>

    <div class="viewer-content">
      <div class="loading-overlay" id="loading">
        <i class="fas fa-circle-notch"></i>
        <p style="color: var(--text-secondary);">正在加载 Notebook...</p>
        <p style="color: var(--text-muted); font-size: 13px; margin-top: 8px;">正在加载本地静态预览</p>
      </div>
      
      <iframe 
        id="notebook-frame"
        name="notebook-frame"
        src="notebook-content.html"
        onload="document.getElementById('loading').classList.add('hidden')"
      ></iframe>
    </div>
  </div>
  <script src="../assets/js/main.js?v=20260425-2"></script>
</body>
</html>
