<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notebook 预览 - 机器学习项目 | Data Insights</title>
  <meta name="description" content="在线查看完整的机器学习分析Notebook，包含数据探索、特征工程、模型训练和结果可视化全流程。">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/main.css">
  
  <style>
    body {
      overflow: hidden;
    }
    
    .notebook-viewer {
      display: flex;
      height: 100vh;
      padding-top: 70px;
    }
    
    .notebook-sidebar {
      width: 300px;
      background: #f8f9fa;
      border-right: 1px solid var(--border-color);
      padding: 30px 20px;
      overflow-y: auto;
      flex-shrink: 0;
    }
    
    .notebook-content {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    
    .notebook-content iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    
    .toc-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }
    
    .toc-list {
      list-style: none;
      margin-bottom: 30px;
    }
    
    .toc-list li {
      margin-bottom: 4px;
    }
    
    .toc-list a {
      display: block;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--text-secondary);
      transition: var(--transition);
    }
    
    .toc-list a:hover {
      background: white;
      color: var(--primary-color);
    }
    
    .notebook-info {
      padding: 20px;
      background: white;
      border-radius: var(--radius-md);
      margin-bottom: 20px;
    }
    
    .notebook-info h3 {
      font-size: 16px;
      margin-bottom: 12px;
      color: var(--text-primary);
    }
    
    .notebook-info .meta {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.8;
    }
    
    .notebook-info .meta i {
      width: 16px;
      margin-right: 8px;
      color: var(--secondary-color);
    }
    
    .download-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      background: var(--primary-color);
      color: white;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 500;
      transition: var(--transition);
    }
    
    .download-btn:hover {
      background: #283593;
    }
    
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: var(--text-secondary);
    }
    
    .loading i {
      font-size: 48px;
      margin-bottom: 16px;
      color: var(--secondary-color);
    }
    
    @media (max-width: 768px) {
      .notebook-sidebar {
        display: none;
      }
      
      .notebook-viewer {
        flex-direction: column;
      }
      
      .notebook-content {
        height: calc(100vh - 70px);
      }
    }
  </style>
</head>
<body>
  <header style="position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: white;">
    <nav class="container">
      <a href="../index.html" class="logo">
        <div class="logo-icon">
          <i class="fas fa-chart-line"></i>
        </div>
        <span>Data Insights</span>
      </a>
      
      <ul class="nav-links">
        <li><a href="../index.html">首页</a></li>
        <li><a href="index.html">项目介绍</a></li>
        <li><a href="notebook.html" class="active">Notebook</a></li>
      </ul>
      
      <button class="mobile-menu-btn">
        <i class="fas fa-bars"></i>
      </button>
    </nav>
  </header>

  <div class="notebook-viewer"
    <aside class="notebook-sidebar">
      <div class="notebook-info">
        <h3><i class="fas fa-brain"></i> 机器学习分类预测</h3>
        <div class="meta">
          <div><i class="fas fa-database"></i> 4,050条数据</div>
          <div><i class="fas fa-chart-line"></i> 3种模型对比</div>
          <div><i class="fas fa-star"></i> AUC 0.70</div>
          <div><i class="fas fa-clock"></i> 预计30分钟</div>
        </div>
      </div>
      
      <div class="toc-title">目录导航</div>
      <ul class="toc-list">
        <li><a href="https://nbviewer.org/github/waanng/data-site/blob/main/ml_analysis_notebook_executed.ipynb#环境准备" target="_blank">环境准备</a></li>
        <li><a href="https://nbviewer.org/github/waanng/data-site/blob/main/ml_analysis_notebook_executed.ipynb#数据加载" target="_blank">数据加载</a></li>
        <li><a href="https://nbviewer.org/github/waanng/data-site/blob/main/ml_analysis_notebook_executed.ipynb#探索性分析" target="_blank">探索性分析</a></li>
        <li><a href="https://nbviewer.org/github/waanng/data-site/blob/main/ml_analysis_notebook_executed.ipynb#特征工程" target="_blank">特征工程</a></li>
        <li><a href="https://nbviewer.org/github/waanng/data-site/blob/main/ml_analysis_notebook_executed.ipynb#模型训练" target="_blank">模型训练</a></li>
        <li><a href="https://nbviewer.org/github/waanng/data-site/blob/main/ml_analysis_notebook_executed.ipynb#模型评估" target="_blank">模型评估</a></li>
        <li><a href="https://nbviewer.org/github/waanng/data-site/blob/main/ml_analysis_notebook_executed.ipynb#结果可视化" target="_blank">结果可视化</a></li>
        <li><a href="https://nbviewer.org/github/waanng/data-site/blob/main/ml_analysis_notebook_executed.ipynb#可解释性" target="_blank">可解释性分析</a></li>
        <li><a href="https://nbviewer.org/github/waanng/data-site/blob/main/ml_analysis_notebook_executed.ipynb#业务洞察" target="_blank">业务洞察</a></li>
      </ul>
      
      <a href="https://raw.githubusercontent.com/waanng/data-site/main/ml_analysis_notebook_executed.ipynb" class="download-btn" target="_blank">
        <i class="fas fa-download"></i>
        下载 Notebook
      </a>
    </aside>

    <div class="notebook-content">
      <div class="loading" id="loading">
        <i class="fas fa-circle-notch fa-spin"></i>
        <p>正在加载 Notebook...</p>
      </div>
      
      <!-- 使用 nbviewer 嵌入完整的执行过的 notebook -->
      <iframe 
        id="notebook-frame"
        src="https://nbviewer.org/github/waanng/data-site/blob/main/ml_analysis_notebook_executed.ipynb" 
        onload="document.getElementById('loading').style.display='none'"
        sandbox="allow-scripts allow-same-origin"
      ></iframe>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
  
  <script>
    // 移动端显示/隐藏侧边栏
    document.querySelector('.mobile-menu-btn').addEventListener('click', function() {
      const sidebar = document.querySelector('.notebook-sidebar');
      sidebar.style.display = sidebar.style.display === 'block' ? 'none' : 'block';
      sidebar.style.position = 'fixed';
      sidebar.style.top = '70px';
      sidebar.style.left = '0';
      sidebar.style.right = '0';
      sidebar.style.bottom = '0';
      sidebar.style.zIndex = '999';
      sidebar.style.width = '100%';
    });
  </script>
</body>
</html>
